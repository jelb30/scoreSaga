spring.application.name=scoreSaga
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${SCORESAGA_DB_URL:jdbc:postgresql://localhost:5432/scoreSaga}
spring.datasource.username=${SCORESAGA_DB_USERNAME:postgres}
spring.datasource.password=${SCORESAGA_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=${SERVER_PORT:8080}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:3600000}

# ---- ScoreSaga external APIs ----
scoresaga.external.football.base-url=${FOOTBALL_API_BASE_URL:https://api.football-data.org/v4}
scoresaga.external.football.api-key=${FOOTBALL_API_KEY:}

scoresaga.external.cricket.base-url=${CRICKET_API_BASE_URL:https://example-cricket-api.com}
scoresaga.external.cricket.api-key=${CRICKET_API_KEY:}

logging.level.root=INFO
logging.level.com.scoresaga=DEBUG
