spring.application.name=scoreSaga-test

spring.datasource.url=jdbc:h2:mem:scoresaga;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

jwt.secret=test-secret-key-that-is-long-enough-for-hs256-signing-1234567890
jwt.expiration=3600000

scoresaga.external.football.base-url=https://example.test
scoresaga.external.football.api-key=test-football-key
scoresaga.external.cricket.base-url=https://example.test
scoresaga.external.cricket.api-key=test-cricket-key

spring.task.scheduling.enabled=false
scoresaga.sync.run-on-startup=false

logging.level.root=WARN
logging.level.com.scoresaga=INFO
